services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      TENSOR_VIZ_CORS_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://127.0.0.1:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

services:
  backend:
    container_name: TensorViz-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "7860:7860"
    environment:
      TENSOR_VIZ_CORS_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"    

  frontend:
    container_name: TensorViz-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://127.0.0.1:7860
    ports:
      - "5173:5173"
    depends_on:
      - backend
 